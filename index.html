<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PleaseHackIt - Binary Challenges</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 10px;
      }
      p {
        margin: 0 0 20px;
        color: #cbd5e1;
      }
      .downloads {
        display: grid;
        gap: 12px;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: #0f172a;
        background: #38bdf8;
        font-weight: bold;
        padding: 12px 14px;
        border-radius: 8px;
      }
      a:hover {
        background: #7dd3fc;
      }
      .note {
        margin-top: 18px;
        font-size: 14px;
        color: #94a3b8;
      }
      code {
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>PleaseHackIt</h1>
      <p>Download a binary and try to crack it.</p>

      <div class="downloads">
        <a href="./bin/PleaseHackIt_x86_64" download>Download x86_64 binary</a>
        <a href="./bin/PleaseHackIt_arm64" download>Download arm64 binary</a>
      </div>

      <p class="note">
        After download, make it executable:
        <code>chmod +x PleaseHackIt_x86_64</code> or
        <code>chmod +x PleaseHackIt_arm64</code>
      </p>

      <span>Made by syntaxMORG0</span>
    </main>
  </body>
</html>
